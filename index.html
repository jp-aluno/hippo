<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GitHub Repo Scanner — ZIP-first then REST</title>
<style>
  body{font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;margin:18px;color:#111}
  .card{background:#fff;border:1px solid #e6e9ee;padding:12px;border-radius:8px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  label{font-size:13px;color:#555}
  input[type="text"], input[type="password"]{padding:6px;border:1px solid #ccc;border-radius:6px}
  button{padding:8px 12px;border-radius:6px;border:1px solid #bbb;background:#f7f8fa;cursor:pointer}
  button:disabled{opacity:.5;cursor:not-allowed}
  #main{display:flex;gap:12px;margin-top:12px}
  #left{width:40%;min-width:300px;max-height:70vh;overflow:auto}
  #right{flex:1;min-width:320px;max-height:70vh;overflow:auto}
  .folder{font-weight:600;cursor:pointer;margin:6px 0}
  .file{margin-left:18px;cursor:pointer;color:#1768ff;display:block;padding:4px 0}
  .path{font-size:13px;color:#666;margin-bottom:8px}
  pre.content{background:#0b1220;color:#e6f2ff;padding:12px;border-radius:6px;border:1px solid #0f1724;white-space:pre-wrap;word-break:break-word}
  .status{font-size:13px;color:#666;margin-top:8px}
  .warn{color:#b44}
</style>
</head>
<body>
<div class="card">
  <h2 style="margin:0 0 8px 0">GitHub Repo Scanner — ZIP-first then REST</h2>
  <div class="row" style="margin-bottom:8px">
    <label>Owner <input id="owner" type="text" value="jonnypaes" /></label>
    <label>Repo <input id="repo" type="text" value="console.js" /></label>
    <label>Branch <input id="branch" type="text" value="main" /></label>
  </div>

  <div class="row" style="margin-bottom:8px">
    <label>GitHub token (optional, empty by default)
      <input id="token" type="password" placeholder="ghp_xxx (optional)" style="width:280px" />
    </label>
  </div>

  <div class="row" style="margin-bottom:8px">
    <button id="btnLoad">Load (ZIP first)</button>
    <button id="btnExportJSON" disabled>Export JSON</button>
    <button id="btnExportMD" disabled>Export Markdown</button>
    <button id="btnClear" disabled>Clear</button>
  </div>

  <div id="status" class="status">Status: idle — will try ZIP via <code>api.github.com/zipball</code> first, then REST if ZIP fails.</div>
</div>

<div id="main">
  <div id="left" class="card">
    <div class="path" id="repoPath">No repo loaded</div>
    <div id="tree"></div>
  </div>

  <div id="right" class="card">
    <div id="fileInfo" class="path">No file selected</div>
    <div id="fileContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
/*
  Behavior:
   1) Try: GET https://api.github.com/repos/:owner/:repo/zipball/:branch
      - If succeeds -> unzip in-browser -> build tree -> done.
   2) If ZIP step fails (network, CORS, non-OK response, etc) -> then
      call REST: recursively list `https://api.github.com/repos/:owner/:repo/contents/:path`
      - If REST returns 403 -> stop and show message suggesting token (rate-limit)
   3) Optional token input is respected if provided (not mandatory).
   4) Export JSON/MD preserved.
*/

const $ = id => document.getElementById(id);
const btnLoad = $('btnLoad'), btnExportJSON = $('btnExportJSON'), btnExportMD = $('btnExportMD'), btnClear = $('btnClear');
const ownerEl = $('owner'), repoEl = $('repo'), branchEl = $('branch'), tokenEl = $('token');
const statusEl = $('status'), repoPathEl = $('repoPath'), treeEl = $('tree'), fileInfoEl = $('fileInfo'), fileContentEl = $('fileContent');

let repoTree = null;
let loadMode = null;

function setStatus(msg, warn=false){
  statusEl.textContent = (warn ? '⚠️ ' : 'Status: ') + msg;
  if(warn) statusEl.classList.add('warn'); else statusEl.classList.remove('warn');
}

function downloadBlob(name, blob){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

function buildAuthHeaders(){
  const headers = { 'Accept': 'application/vnd.github.v3+json' };
  const token = (tokenEl.value || '').trim();
  if(token) headers['Authorization'] = `token ${token}`;
  return headers;
}

/* ---------------- ZIP via api.github.com (CORS-safe) ---------------- */
async function tryZipApi(owner, repo, branch){
  setStatus('Attempting ZIP via api.github.com (cors-safe zipball)...');
  const url = `https://api.github.com/repos/${owner}/${repo}/zipball/${branch}`;
  const res = await fetch(url, { headers: buildAuthHeaders() });
  if(!res.ok) throw new Error(`ZIP API download failed: ${res.status} ${res.statusText}`);
  const blob = await res.blob();
  setStatus(`ZIP downloaded (${Math.round(blob.size/1024)} KB). Unpacking...`);
  const zip = await JSZip.loadAsync(blob);
  return buildTreeFromZip(zip, repo);
}

/* ---------------- build tree from JSZip ---------------- */
function buildTreeFromZip(zip, repoName){
  const keys = Object.keys(zip.files);
  let prefix = '';
  if(keys.length){
    const m = keys[0].match(/^([^\/]+)\//);
    if(m) prefix = m[1] + '/';
  }

  const root = { type:'folder', name:repoName, path:'', children:[] };

  function ensureFolder(parent, parts){
    if(parts.length === 0) return parent;
    const head = parts.shift();
    let child = parent.children.find(c => c.type === 'folder' && c.name === head);
    if(!child){
      child = { type:'folder', name: head, path: parent.path ? parent.path + '/' + head : head, children: [] };
      parent.children.push(child);
    }
    return ensureFolder(child, parts);
  }

  const files = [];
  zip.forEach((relPath, fileObj) => {
    if(fileObj.dir) return;
    const cleaned = relPath.startsWith(prefix) ? relPath.slice(prefix.length) : relPath;
    if(!cleaned) return;
    files.push({ path: cleaned, fileObj });
  });

  files.sort((a,b) => a.path.localeCompare(b.path));

  for(const f of files){
    const parts = f.path.split('/');
    const name = parts.pop();
    const folder = ensureFolder(root, parts);
    folder.children.push({
      type:'file',
      name,
      path: f.path,
      jszipFile: f.fileObj,
      contentText: null,
      contentBase64: null,
      isBinary: false,
      size: f.fileObj._data ? f.fileObj._data.uncompressedSize : null
    });
  }

  setStatus('ZIP unpacked and tree built (zip mode).');
  loadMode = 'zip';
  return root;
}

/* ---------------- REST per-folder recursion ---------------- */
async function fetchJsonWithAuth(url){
  const res = await fetch(url, { headers: buildAuthHeaders() });
  return res;
}

async function tryRestContents(owner, repo){
  setStatus('Falling back to REST contents API (recursive).');
  const root = { type:'folder', name: repo, path:'', children: [] };

  async function scanFolder(parent, path){
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path || ''}`;
    setStatus(`Listing: ${path || '/'}`);
    const res = await fetchJsonWithAuth(url);
    if(res.status === 403){
      // Rate-limited or forbidden — bubble up with hint
      throw new Error('REST API 403 — rate-limited or forbidden. Provide a token to increase limits.');
    }
    if(!res.ok) throw new Error(`GitHub API ${res.status} — ${url}`);
    const entries = await res.json();
    if(!Array.isArray(entries)) return;
    // sort dirs first
    entries.sort((a,b) => (a.type === b.type) ? a.name.localeCompare(b.name) : (a.type === 'dir' ? -1 : 1));
    for(const item of entries){
      if(item.type === 'dir'){
        const node = { type:'folder', name: item.name, path: item.path, children: [] };
        parent.children.push(node);
        await scanFolder(node, item.path);
      } else if(item.type === 'file'){
        parent.children.push({
          type:'file',
          name: item.name,
          path: item.path,
          url: item.url,
          contentText: null,
          contentBase64: null,
          isBinary: false,
          size: item.size || null
        });
      }
    }
  }

  await scanFolder(root, '');
  setStatus('REST tree built (rest mode).');
  loadMode = 'rest';
  return root;
}

/* ---------------- Render tree UI ---------------- */
function renderTree(root){
  treeEl.innerHTML = '';
  function makeFolder(node){
    const wrap = document.createElement('div');
    const header = document.createElement('div');
    header.className = 'folder';
    header.textContent = '📁 ' + node.name;
    wrap.appendChild(header);
    const inner = document.createElement('div');
    inner.style.marginLeft = '10px';
    inner.style.display = 'none';
    wrap.appendChild(inner);
    header.onclick = () => inner.style.display = inner.style.display === 'none' ? 'block' : 'none';
    for(const c of node.children){
      if(c.type === 'folder') inner.appendChild(makeFolder(c));
      else inner.appendChild(makeFile(c));
    }
    return wrap;
  }
  function makeFile(fileNode){
    const el = document.createElement('div');
    el.className = 'file';
    el.textContent = '📄 ' + fileNode.name;
    el.title = fileNode.path;
    el.onclick = () => previewFile(fileNode);
    return el;
  }
  treeEl.appendChild(makeFolder(root));
}

/* ---------------- Preview file (lazy load) ---------------- */
async function previewFile(node){
  fileInfoEl.textContent = node.path + (node.size ? ` — ${node.size} bytes` : '');
  fileContentEl.innerHTML = '';

  // ZIP-backed file: node.jszipFile
  if(node.jszipFile){
    setStatus(`Reading ${node.path} from ZIP...`);
    try {
      const text = await node.jszipFile.async('string');
      if(text.indexOf('\0') !== -1){
        node.isBinary = true;
        fileContentEl.innerHTML = '<div class="warn">Binary file — preview skipped</div>';
      } else {
        node.contentText = text;
        fileContentEl.innerHTML = `<pre class="content">${escapeHtml(text)}</pre>`;
      }
    } catch(e){
      node.isBinary = true;
      fileContentEl.innerHTML = '<div class="warn">Cannot preview (binary or read error)</div>';
    } finally {
      setStatus('Ready.');
    }
    return;
  }

  // REST-backed file: node.url
  if(node.url){
    setStatus(`Fetching ${node.path} via REST...`);
    try {
      const res = await fetchJsonWithAuth(node.url);
      if(res.status === 403){
        throw new Error('REST API 403 — rate-limited or forbidden. Provide a token to increase limits.');
      }
      if(!res.ok) throw new Error(`GitHub API ${res.status} — ${node.url}`);
      const data = await res.json();
      const b64 = (data.content || '').replace(/\n/g,'');
      // decode base64 safely to UTF-8 if possible
      let raw = atob(b64);
      let decoded = null;
      try {
        const bytes = [];
        for(let i=0;i<raw.length;i++) bytes.push('%' + ('00' + raw.charCodeAt(i).toString(16)).slice(-2));
        decoded = decodeURIComponent(bytes.join(''));
      } catch(_) {
        decoded = raw;
      }
      if(decoded.indexOf('\0') !== -1){
        node.isBinary = true;
        fileContentEl.innerHTML = '<div class="warn">Binary file — preview skipped</div>';
        node.contentBase64 = b64;
      } else {
        node.contentText = decoded;
        fileContentEl.innerHTML = `<pre class="content">${escapeHtml(decoded)}</pre>`;
        node.contentBase64 = b64;
      }
    } catch(e){
      fileContentEl.innerHTML = `<div class="warn">${escapeHtml(e.message)}</div>`;
    } finally {
      setStatus('Ready.');
    }
    return;
  }

  fileContentEl.innerHTML = '<div class="small">No preview available</div>';
}

/* ---------------- Export helpers ---------------- */
function serializeNode(node){
  if(node.type === 'folder') return { type:'folder', name: node.name, path: node.path || '', children: node.children.map(serializeNode) };
  return {
    type:'file',
    name: node.name,
    path: node.path,
    size: node.size || null,
    isBinary: !!node.isBinary,
    contentText: node.contentText || null,
    contentBase64: node.contentBase64 || null,
    url: node.url || null
  };
}

function walkFiles(root){
  const out = [];
  (function w(n){ if(n.type==='file') out.push(n); else n.children.forEach(w); })(root);
  return out;
}

async function arrayBufferToBase64(ab){
  const bytes = new Uint8Array(ab);
  let binary = '';
  const chunk = 0x8000;
  for (let i=0;i<bytes.length;i+=chunk){
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
  }
  return btoa(binary);
}

async function collectAllFiles(root){
  const files = walkFiles(root);
  const total = files.length;
  let processed = 0;
  setStatus(`Collecting ${total} files (this will fetch file contents)`);

  for(const f of files){
    if(f.contentBase64 || f.contentText) { processed++; setStatus(`Collected ${processed}/${total}`); continue; }

    if(f.jszipFile){
      try {
        const ab = await f.jszipFile.async('arraybuffer');
        f.contentBase64 = await arrayBufferToBase64(ab);
        // try text decode
        try {
          const text = await f.jszipFile.async('string');
          if(text.indexOf('\0') === -1) f.contentText = text;
        } catch(_) {}
      } catch(_) { /* ignore */ }
    } else if(f.url){
      try {
        const res = await fetchJsonWithAuth(f.url);
        if(res.status === 403) throw new Error('REST API 403 — rate-limited or forbidden. Provide token.');
        if(!res.ok) throw new Error('File fetch failed: ' + res.status);
        const data = await res.json();
        const b64 = (data.content || '').replace(/\n/g,'');
        f.contentBase64 = b64;
        try {
          const raw = atob(b64);
          const bytes = [];
          for(let i=0;i<raw.length;i++) bytes.push('%' + ('00' + raw.charCodeAt(i).toString(16)).slice(-2));
          const text = decodeURIComponent(bytes.join(''));
          if(text.indexOf('\0') === -1) f.contentText = text;
        } catch(_) {}
      } catch(e){
        f.contentBase64 = null;
      }
    }
    processed++;
    setStatus(`Collected ${processed}/${total}`);
  }
  setStatus(`Collection complete (${total} files)`);
  return files;
}

async function exportJSON(){
  if(!repoTree) return alert('Load repo first');
  const filesCount = walkFiles(repoTree).length;
  if(filesCount > 1000 && !confirm(`Repo has ~${filesCount} files. Export may be slow and memory-heavy. Continue?`)) return;
  btnExportJSON.disabled = true; btnExportMD.disabled = true; btnLoad.disabled = true;
  try {
    await collectAllFiles(repoTree);
    const payload = { generatedAt: new Date().toISOString(), repo: `${ownerEl.value}/${repoEl.value}`, loadMode, root: serializeNode(repoTree) };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    downloadBlob(`${ownerEl.value}-${repoEl.value}-tree.json`, blob);
    setStatus('JSON exported.');
  } catch(e){
    setStatus(`Export failed: ${e.message}`, true);
  } finally {
    btnExportJSON.disabled = false; btnExportMD.disabled = false; btnLoad.disabled = false;
  }
}

async function exportMarkdown(){
  if(!repoTree) return alert('Load repo first');
  const filesCount = walkFiles(repoTree).length;
  if(filesCount > 1000 && !confirm(`Repo has ~${filesCount} files. Export may be slow and memory-heavy. Continue?`)) return;
  btnExportJSON.disabled = true; btnExportMD.disabled = true; btnLoad.disabled = true;
  try {
    await collectAllFiles(repoTree);
    const files = walkFiles(repoTree);
    let md = `# Repository: ${ownerEl.value}/${repoEl.value}\n\n_exported: ${new Date().toISOString()}_\n\n## Index\n\n`;
    for(const f of files){
      const anchor = f.path.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
      f.__anchor = anchor;
      md += `- [${f.path}](#${anchor})\n`;
    }
    md += `\n---\n\n`;
    // tree outline
    function renderTree(node, depth=0){
      const indent = '  '.repeat(depth);
      if(node.type === 'folder'){
        md += `${indent}- **${node.name}**\n`;
        for(const c of node.children) renderTree(c, depth+1);
      } else {
        md += `${indent}  - ${node.name}\n`;
      }
    }
    renderTree(repoTree, 0);
    md += `\n---\n\n`;
    for(const f of files){
      md += `### ${f.path}\n<a id="${f.__anchor}"></a>\n\n`;
      if(f.contentText){
        md += `\`\`\`\n${f.contentText.replace(/```/g,'``\\`')}\n\`\`\`\n\n`;
      } else if(f.contentBase64){
        md += `_binary file — base64 below_\n\n\`\`\`base64\n${f.contentBase64}\n\`\`\`\n\n`;
      } else {
        md += `_no content available_\n\n`;
      }
    }
    const blob = new Blob([md], { type: 'text/markdown' });
    downloadBlob(`${ownerEl.value}-${repoEl.value}-tree.md`, blob);
    setStatus('Markdown exported.');
  } catch(e){
    setStatus(`Export failed: ${e.message}`, true);
  } finally {
    btnExportJSON.disabled = false; btnExportMD.disabled = false; btnLoad.disabled = false;
  }
}

/* ---------------- Main flow: ZIP first, then REST on any ZIP error ---------------- */
async function loadRepo(){
  repoTree = null;
  treeEl.innerHTML = '';
  fileInfoEl.textContent = 'No file selected';
  fileContentEl.innerHTML = '';
  btnExportJSON.disabled = true; btnExportMD.disabled = true; btnClear.disabled = true;
  setStatus('Starting: will try ZIP (api) first...');
  const owner = (ownerEl.value || '').trim();
  const repo = (repoEl.value || '').trim();
  const branch = (branchEl.value || 'main').trim();

  try {
    // 1) Try zip via api.github.com
    try {
      const tree = await tryZipApi(owner, repo, branch);
      repoTree = tree;
      renderTree(repoTree);
      repoPathEl.textContent = `${owner}/${repo}  •  mode: ZIP`;
      btnExportJSON.disabled = false; btnExportMD.disabled = false; btnClear.disabled = false;
      setStatus('Loaded via ZIP (api).');
      return;
    } catch(zipErr){
      console.warn('ZIP attempt failed, will try REST fallback:', zipErr);
      // continue to REST fallback
    }

    // 2) REST fallback
    try {
      const tree = await tryRestContents(owner, repo);
      repoTree = tree;
      renderTree(repoTree);
      repoPathEl.textContent = `${owner}/${repo}  •  mode: REST`;
      btnExportJSON.disabled = false; btnExportMD.disabled = false; btnClear.disabled = false;
      setStatus('Loaded via REST (contents API).');
      return;
    } catch(restErr){
      // If REST failed with 403, give clear guidance
      if(('' + restErr).includes('403') || (restErr.message && restErr.message.includes('403'))){
        setStatus('Load failed: REST API 403 — rate-limited or forbidden. Provide a GitHub token in the token field and try again.', true);
      } else {
        setStatus('Load failed: ' + restErr.message, true);
      }
      throw restErr;
    }

  } catch(e){
    console.error('Final load error:', e);
    // bubble up status already set
  }
}

/* ---------------- UI wiring ---------------- */
btnLoad.onclick = async () => {
  btnLoad.disabled = true;
  await loadRepo();
  btnLoad.disabled = false;
};
btnExportJSON.onclick = exportJSON;
btnExportMD.onclick = exportMarkdown;
btnClear.onclick = () => { repoTree = null; treeEl.innerHTML=''; repoPathEl.textContent='No repo loaded'; fileInfoEl.textContent='No file selected'; fileContentEl.innerHTML=''; btnExportJSON.disabled = true; btnExportMD.disabled = true; btnClear.disabled = true; setStatus('Idle'); };

function escapeHtml(s){ if(s==null) return ''; return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
